<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MLS Listing Alerts – Subscribe</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 40px;
    max-width: 460px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .logo { font-size: 40px; text-align: center; margin-bottom: 8px; }
  h1 { text-align: center; color: #1a1a2e; font-size: 22px; margin-bottom: 6px; }
  .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 28px; line-height: 1.5; }
  label { display: block; font-weight: 600; color: #333; margin-bottom: 6px; font-size: 14px; }
  input {
    width: 100%; padding: 12px 14px; border: 2px solid #e0e0e0; border-radius: 10px;
    font-size: 15px; margin-bottom: 18px; transition: border-color 0.2s;
  }
  input:focus { outline: none; border-color: #667eea; }
  button {
    width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2);
    color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: 600;
    cursor: pointer; transition: transform 0.1s, opacity 0.2s;
  }
  button:hover { opacity: 0.9; transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .status { text-align: center; margin-top: 16px; padding: 12px; border-radius: 10px; font-size: 14px; display: none; }
  .status.success { display: block; background: #d4edda; color: #155724; }
  .status.error { display: block; background: #f8d7da; color: #721c24; }
  .footer { text-align: center; margin-top: 24px; font-size: 12px; color: #999; }
  .footer a { color: #667eea; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🏠</div>
  <h1>MLS Listing Alerts</h1>
  <p class="subtitle">Get daily email notifications for new vacant MLS listings in Cebu.<br>Powered by Cebu Real Estate Board, Inc.</p>
  
  <form id="signupForm">
    <label for="name">Your Name</label>
    <input type="text" id="name" name="name" placeholder="Juan Dela Cruz" required>
    
    <label for="email">Email Address</label>
    <input type="email" id="email" name="email" placeholder="you@example.com" required>
    
    <button type="submit" id="submitBtn">🔔 Subscribe to Alerts</button>
  </form>
  
  <div id="status" class="status"></div>
  <div class="footer">Credits to <strong>Cebu Real Estate Board, Inc.</strong></div>
</div>

<script src="config.js"></script>
<script>
  // Webhook URL is loaded from config.js
  // Edit config.js to set your webhook URL

  document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const status = document.getElementById('status');
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();

    btn.disabled = true;
    btn.textContent = '⏳ Subscribing...';
    status.className = 'status';
    status.style.display = 'none';

    try {
      // Use an image beacon approach to avoid CORS issues entirely
      const params = new URLSearchParams({ name, email });
      const img = new Image();
      let resolved = false;
      
      const done = (success) => {
        if (resolved) return;
        resolved = true;
        if (success) {
          status.className = 'status success';
          status.textContent = '✅ You\'re subscribed! You\'ll receive daily MLS listing alerts.';
          status.style.display = 'block';
          document.getElementById('signupForm').reset();
        }
      };

      // Also send via fetch no-cors as backup
      fetch(WEBHOOK_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify({ name, email })
      }).then(() => done(true)).catch(() => {});

      // Give it a moment then show success (no-cors doesn't give us a real response)
      setTimeout(() => done(true), 1500);
    } catch (err) {
      status.className = 'status error';
      status.textContent = '❌ Something went wrong. Please try again.';
      status.style.display = 'block';
    }
    btn.disabled = false;
    btn.textContent = '🔔 Subscribe to Alerts';
  });
</script>
</body>
</html>
